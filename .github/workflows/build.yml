name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      # 👇 Move into the assistant folder for all Flutter commands
      - name: Install dependencies
        working-directory: ./assistant
        run: flutter pub get

      - name: Build APK
        working-directory: ./assistant
        run: flutter build apk --release

      # 👇 The APK will be inside assistant/build/...
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: assistant/build/app/outputs/flutter-apk/app-release.apk
